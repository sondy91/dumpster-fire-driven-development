<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Agile Vibe-Coded To-Do Dashboard</title>
    <style>
        body {
            font-family: 'Comic Sans MS', sans-serif;
            background-color: #f4f4f9;
            background-image: radial-gradient(#d1d1e0 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .todo-vibe-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border-radius: 15px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        h1 { text-align: center; color: #2c3e50; font-size: 1.8rem; }
        .subtitle { text-align: center; font-size: 0.9rem; color: #7f8c8d; margin-bottom: 20px;}

        #add-ticket-btn {
            background: linear-gradient(45deg, #3498db, #2980b9);
            color: white;
            border: none;
            padding: 15px 20px;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
            width: 100%;
            font-size: 1.1rem;
            box-shadow: 0 4px 0 #1f618d;
            margin-bottom: 20px;
        }
        #add-ticket-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        #todo-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
            max-height: 60vh;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
        }

        .todo-item {
            background: #fff;
            border: 1px solid #bdc3c7;
            border-left: 5px solid #8e44ad;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, opacity 0.3s ease;
            position: relative;
            cursor: grab;
        }
        .todo-item:active { cursor: grabbing; }

        .todo-item.done {
            background: #ecf0f1;
            opacity: 0.7;
        }
        .todo-item.done .task-title {
            text-decoration: line-through;
            color: #95a5a6;
        }

        .task-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;}
        .task-title { font-weight: bold; font-size: 1.1rem; }
        .task-points { background: #f39c12; color: #fff; padding: 3px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: bold;}
        .task-meta { font-size: 0.8rem; color: #7f8c8d; }

        .delete-todo-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            width: 100%;
        }

        /* JIRA MODAL */
        #jira-modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hidden { display: none !important; }

        #jira-modal {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            border-top: 8px solid #3498db;
        }

        .jira-form-group { margin-bottom: 15px; }
        .jira-form-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #333;}
        .jira-form-group input, .jira-form-group textarea, .jira-form-group select {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
            font-family: inherit;
        }
        .jira-form-group textarea { resize: vertical; height: 80px; }

        #submit-ticket-btn {
            background: #e67e22; color: white; border: none; padding: 12px 20px;
            width: 100%; border-radius: 4px; font-size: 1.1rem; font-weight: bold; cursor: pointer;
        }

        /* SPINNER */
        .spinner-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            margin: 20px 0;
            color: #8e44ad;
            font-weight: bold;
            text-align: center;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 5px solid rgba(142, 68, 173, 0.2);
            border-top: 5px solid #8e44ad;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #return-btn {
            display: block; margin-top: 30px; text-align: center;
            color: #3498db; text-decoration: none; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="todo-vibe-card">
        <h1>Enterprise Agile Board</h1>
        <p class="subtitle">Mandatory Action Items & Synergy Tracking</p>
        
        <button id="add-ticket-btn">Create New Epic / Story / Task</button>
        
        <div id="sync-status"></div>

        <ul id="todo-list">
            <li class="todo-item" data-id="initial-task">
                <div class="task-header">
                    <span class="task-title">Rewrite everything in Rust</span>
                    <span class="task-points">13 pts</span>
                </div>
                <div class="task-meta">Assignee: Vibe Coder | Epic: CORE-REFACTOR</div>
                <button type="button" class="delete-todo-btn">Mark as Done</button>
            </li>
        </ul>

        <a href="../../../../../../index.html" id="return-btn"><- Back to Enterprise Registration</a>
    </div>

    <!-- JIRA-STYLE CREATION MODAL -->
    <div id="jira-modal-overlay" class="hidden">
        <div id="jira-modal">
            <h2>Create Issue</h2>
            <form id="jira-form">
                <div class="jira-form-group">
                    <label>Title (Summary) *</label>
                    <input type="text" id="j-title" required placeholder="e.g., Buy Milk">
                </div>
                <div class="jira-form-group">
                    <label>Description *</label>
                    <textarea id="j-desc" required placeholder="Detailed business justification for this item."></textarea>
                </div>
                <div class="jira-form-group">
                    <label>Acceptance Criteria *</label>
                    <textarea id="j-ac" required placeholder="Given... When... Then..."></textarea>
                </div>
                <div class="jira-form-group">
                    <label>Story Points (Fibonacci Only) *</label>
                    <select id="j-points" required>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="5">5</option>
                        <option value="8">8</option>
                        <option value="13">13</option>
                        <option value="21">21</option>
                        <option value="55">55 (Epic Scale)</option>
                    </select>
                </div>
                <div class="jira-form-group">
                    <label>Assignee</label>
                    <input type="text" id="j-assignee" value="Unassigned">
                </div>
                <div class="jira-form-group">
                    <label>Epic Link</label>
                    <input type="text" id="j-epic" placeholder="e.g., GROCERY-101">
                </div>
                <button type="submit" id="submit-ticket-btn">Submit to Backlog</button>
            </form>
        </div>
    </div>

    <script>
        const addTicketBtn = document.getElementById('add-ticket-btn');
        const jiraModalOverlay = document.getElementById('jira-modal-overlay');
        const jiraForm = document.getElementById('jira-form');
        const todoList = document.getElementById('todo-list');
        const syncStatus = document.getElementById('sync-status');

        const annoyingSubtasks = [
            "Schedule alignment meeting for this task",
            "Draft RFC document for stakeholder review",
            "Update Confluence with post-mortem analysis",
            "Create Docker container for sub-task execution",
            "Request budget approval from finance",
            "Migrate task metadata to Web3 blockchain"
        ];

        // 1. Mandatory Ticket Fields (Modal Logic)
        addTicketBtn.addEventListener('click', () => {
            jiraModalOverlay.classList.remove('hidden');
        });

        // 2. Eventual Consistency Simulation
        jiraForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const title = document.getElementById('j-title').value;
            const points = document.getElementById('j-points').value;
            const assignee = document.getElementById('j-assignee').value || "Unassigned";
            const epic = document.getElementById('j-epic').value || "NO-EPIC";
            
            jiraModalOverlay.classList.add('hidden');
            jiraForm.reset();

            // Simulate blockchain syncing (random between 15s and 45s for testing sanity, 
            // though Enterprise SLA guarantees 45s to 3m usually)
            const syncTime = Math.floor(Math.random() * (45000 - 15000 + 1)) + 15000;
            const messages = [
                "Syncing with the blockchain...", 
                "Provisioning micro-task container...", 
                "Awaiting consensus from 14 nodes...",
                "Running Vibe-Check algorithms..."
            ];
            
            const spinnerDiv = document.createElement('div');
            spinnerDiv.className = 'spinner-container';
            spinnerDiv.innerHTML = `
                <div class="spinner"></div>
                <div>${messages[Math.floor(Math.random() * messages.length)]}</div>
                <div style="font-size:0.7rem; margin-top:5px; color:#999;">Estimated SLA: ${Math.round(syncTime/1000)}s</div>
            `;
            syncStatus.appendChild(spinnerDiv);

            setTimeout(() => {
                spinnerDiv.remove();
                todoList.appendChild(createTaskElement(title, points, assignee, epic));
            }, syncTime);
        });

        // Task Element Creator
        function createTaskElement(title, points, assignee, epic) {
            const li = document.createElement('li');
            li.className = 'todo-item';
            
            li.innerHTML = `
                <div class="task-header">
                    <span class="task-title">${title}</span>
                    <span class="task-points">${points} pts</span>
                </div>
                <div class="task-meta">Assignee: ${assignee} | Epic: ${epic}</div>
                <button type="button" class="delete-todo-btn">Mark as Done</button>
            `;

            attachBehaviors(li, title);
            return li;
        }

        function attachBehaviors(li, title) {
            // 3. Hydra Tasks (Check off = 2 new subtasks)
            const btn = li.querySelector('.delete-todo-btn');
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (li.classList.contains('done')) {
                    alert("This task has been archived for compliance reasons and cannot be mutated.");
                    return;
                }
                
                li.classList.add('done');
                btn.textContent = "Archived";
                
                // Spawn 2 subtasks
                for (let i = 0; i < 2; i++) {
                    const subtaskTitle = annoyingSubtasks[Math.floor(Math.random() * annoyingSubtasks.length)] + ` (Ref: ${title})`;
                    // Small delay so it feels like the hydra is growing
                    setTimeout(() => {
                        todoList.appendChild(createTaskElement(subtaskTitle, "2", "Vibe Coder", "TECH-DEBT"));
                    }, i * 400 + 300);
                }
            });

            // 5. Destructive Swipe Gestures
            let startX = 0;
            let currentX = 0;
            
            li.addEventListener('mousedown', (e) => { startX = e.clientX; });
            li.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; }, {passive: true});

            li.addEventListener('mousemove', (e) => {
                if (startX === 0) return;
                currentX = e.clientX;
                let diff = currentX - startX;
                if (diff < -20 || diff > 20) {
                    li.style.transform = `translateX(${diff}px)`;
                }
            });
            li.addEventListener('touchmove', (e) => {
                if (startX === 0) return;
                currentX = e.touches[0].clientX;
                let diff = currentX - startX;
                if (diff < -20 || diff > 20) {
                    li.style.transform = `translateX(${diff}px)`;
                }
            }, {passive: true});

            const handleSwipeEnd = () => {
                if (startX === 0 || currentX === 0) {
                    startX = 0; currentX = 0;
                    return;
                }
                let diff = currentX - startX;
                startX = 0; currentX = 0;
                
                // Trigger swipe action if moved more than 80px
                if (Math.abs(diff) > 80) {
                    li.style.transform = `translateX(${diff > 0 ? '100vw' : '-100vw'})`;
                    li.style.opacity = '0';
                    
                    setTimeout(() => {
                        // The Destructive Logic
                        const randomChaos = Math.random();
                        if (randomChaos < 0.1) {
                            // 10% chance: Delete everything
                            todoList.innerHTML = '';
                            alert("Task bankruptcy declared. You're welcome.");
                        } else if (randomChaos < 0.4) {
                            // 30% chance: Delete a sibling instead of this one
                            const siblings = Array.from(todoList.children).filter(node => node !== li);
                            if (siblings.length > 0) {
                                const randomSibling = siblings[Math.floor(Math.random() * siblings.length)];
                                randomSibling.remove();
                                alert("Swipe registered. Deleted adjacent task due to responsive layout shift.");
                                // Bring this one back
                                li.style.transform = 'translateX(0)';
                                li.style.opacity = '1';
                            } else {
                                li.remove();
                            }
                        } else {
                            // 60% chance: Delete the actual item swiped
                            li.remove();
                        }
                    }, 300);
                } else {
                    // Snap back
                    li.style.transform = 'translateX(0)';
                }
            };

            li.addEventListener('mouseup', handleSwipeEnd);
            li.addEventListener('mouseleave', handleSwipeEnd);
            li.addEventListener('touchend', handleSwipeEnd);
        }

        // Attach behaviors to initial hardcoded task
        const initialTask = document.querySelector('li.todo-item');
        if (initialTask) {
            attachBehaviors(initialTask, "Rewrite everything in Rust");
        }

        // 4. Vibe-Based Prioritization
        // Shuffle the DOM nodes randomly every 30 seconds
        setInterval(() => {
            const items = Array.from(todoList.children);
            if (items.length < 2) return;
            
            // Fisher-Yates shuffle
            for (let i = items.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                todoList.appendChild(items[j]); // appendChild moves the existing node to the end
            }
            
            // Visual indicator of the shuffle
            items.forEach(item => {
                item.style.backgroundColor = '#f1c40f'; // flash yellow
                setTimeout(() => item.style.backgroundColor = '', 500);
            });
            console.log("Vibe-based reprioritization complete.");
            
        }, 30000); // 30 seconds

    </script>
</body>
</html>
