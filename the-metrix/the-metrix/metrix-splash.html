<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Metrix · Splash Prototyper</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --accent: #4fffb0;
    --accent2: #7c6dfa;
    --accent3: #ff6b6b;
    --accent4: #ffd93d;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --matrix-green: #00ff41;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
  }

  /* ===== TOOLBAR ===== */
  .toolbar {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 100;
  }

  .toolbar-brand {
    font-family: 'Syne', sans-serif;
    font-weight: 900;
    font-size: 13px;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-right: 8px;
    border-right: 1px solid var(--border);
    padding-right: 20px;
    white-space: nowrap;
  }

  .variant-switcher {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 3px;
    gap: 2px;
  }

  .vbtn {
    padding: 6px 14px;
    border-radius: 5px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--muted);
    transition: all 0.2s;
    white-space: nowrap;
  }
  .vbtn.active { background: var(--surface2); color: var(--accent); border: 1px solid var(--border); }
  .vbtn:hover:not(.active) { color: var(--text); }

  .toolbar-actions { margin-left: auto; display: flex; gap: 8px; }

  .btn {
    padding: 7px 16px;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }
  .btn-primary { background: var(--accent); color: #000; font-weight: 600; }
  .btn-primary:hover { background: #3de8a0; transform: translateY(-1px); }
  .btn-ghost { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

  /* ===== STAGE ===== */
  .stage-wrap {
    position: relative;
    overflow: hidden;
    background: #000;
    min-height: 480px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #stage {
    width: 100%;
    height: 100%;
    position: absolute;
    inset: 0;
  }

  /* Scanline overlay */
  .scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 2;
    opacity: 0.4;
  }

  /* Vignette */
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 3;
  }

  /* Central word (used by variant 1) */
  #word-stage {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    pointer-events: none;
  }

  .word-letters {
    display: flex;
    align-items: baseline;
    gap: 0;
    position: relative;
  }

  .letter {
    font-family: 'Syne', sans-serif;
    font-weight: 900;
    font-size: clamp(64px, 10vw, 120px);
    line-height: 1;
    letter-spacing: -2px;
    position: relative;
    display: inline-block;
    color: #fff;
  }

  .letter.dim { color: rgba(255,255,255,0.85); }

  #letter-x {
    color: var(--accent);
    text-shadow: 0 0 30px var(--accent), 0 0 60px var(--accent), 0 0 100px rgba(79,255,176,0.4);
    position: relative;
  }

  .the-prefix {
    font-family: 'Syne', sans-serif;
    font-weight: 400;
    font-size: clamp(14px, 2vw, 22px);
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    position: absolute;
    top: -28px;
    left: 0;
    right: 0;
    text-align: center;
  }

  .tagline {
    position: absolute;
    bottom: -32px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: rgba(255,255,255,0.25);
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
  }

  /* Progress bar */
  .progress-wrap {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    z-index: 20;
  }

  .progress-track {
    width: 100%;
    height: 1px;
    background: rgba(255,255,255,0.1);
    border-radius: 1px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.05s linear;
    box-shadow: 0 0 8px var(--accent);
  }

  .progress-label {
    text-align: center;
    font-size: 9px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.15em;
    margin-top: 8px;
    text-transform: uppercase;
  }

  /* ===== CONTROLS ===== */
  .controls {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 20px 24px;
  }

  .controls-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .controls-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  .controls-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }

  .ctrl {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .ctrl label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .ctrl label span { color: var(--accent); font-size: 10px; }

  input[type=range] {
    width: 100%;
    -webkit-appearance: none;
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    outline: none;
    accent-color: var(--accent);
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 6px rgba(79,255,176,0.5);
  }

  .ctrl select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 8px;
    border-radius: 5px;
    outline: none;
    cursor: pointer;
  }
  .ctrl select option { background: var(--surface2); }

  .ctrl-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }
  .toggle-track {
    width: 32px; height: 17px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle-track.on { background: rgba(79,255,176,0.3); border-color: var(--accent); }
  .toggle-thumb {
    width: 11px; height: 11px;
    background: var(--muted);
    border-radius: 50%;
    position: absolute;
    top: 2px; left: 2px;
    transition: all 0.2s;
  }
  .toggle-track.on .toggle-thumb { left: 17px; background: var(--accent); }
  .ctrl-toggle .toggle-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

  /* Variant-specific controls shown/hidden */
  .ctrl-group { display: contents; }
  .ctrl-group.hidden { display: none; }
</style>
</head>
<body>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="toolbar-brand">THE METRIX · SPLASH</div>

  <div class="variant-switcher">
    <button class="vbtn active" onclick="setVariant('flyIn', this)">① X Fly-In</button>
    <button class="vbtn" onclick="setVariant('matrixRain', this)">② Matrix Rain</button>
    <button class="vbtn" onclick="setVariant('particles', this)">③ Particle Dissolve</button>
  </div>

  <div class="toolbar-actions">
    <button class="btn btn-ghost" onclick="replay()">↺ Replay</button>
    <button class="btn btn-primary" onclick="fullscreen()">⤢ Fullscreen</button>
  </div>
</div>

<!-- STAGE -->
<div class="stage-wrap" id="stage-wrap">
  <canvas id="stage"></canvas>
  <div class="scanlines" id="scanlines"></div>
  <div class="vignette"></div>

  <!-- Word overlay (Variant 1 & 3) -->
  <div id="word-stage">
    <div style="position:relative">
      <div class="the-prefix" id="the-prefix" style="opacity:0">THE</div>
      <div class="word-letters" id="word-letters">
        <span class="letter dim" id="l-m" style="opacity:0">M</span>
        <span class="letter dim" id="l-e" style="opacity:0">E</span>
        <span class="letter dim" id="l-t" style="opacity:0">T</span>
        <span class="letter dim" id="l-r" style="opacity:0">R</span>
        <span class="letter dim" id="l-i" style="opacity:0">I</span>
        <span class="letter" id="l-c" style="opacity:0">C</span>
        <span class="letter" id="letter-x" style="opacity:0">X</span>
      </div>
      <div class="tagline" id="tagline" style="opacity:0">Engineering Intelligence Platform</div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progress-wrap" style="opacity:0">
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="progress-label" id="progress-label">Initializing...</div>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <div class="controls-header">
    <div class="controls-title">⚙ Animation Controls · Live</div>
  </div>
  <div class="controls-grid">

    <!-- SHARED -->
    <div class="ctrl">
      <label>Speed <span id="lbl-speed">1.0×</span></label>
      <input type="range" id="ctrl-speed" min="0.3" max="3" step="0.1" value="1" oninput="updateCtrl('speed', this.value)">
    </div>

    <div class="ctrl ctrl-toggle" onclick="toggleCtrl('scanlines-on')">
      <div class="toggle-label">Scanlines</div>
      <div class="toggle-track on" id="tog-scanlines-on"><div class="toggle-thumb"></div></div>
    </div>

    <div class="ctrl ctrl-toggle" onclick="toggleCtrl('vignette-on')">
      <div class="toggle-label">Vignette</div>
      <div class="toggle-track on" id="tog-vignette-on"><div class="toggle-thumb"></div></div>
    </div>

    <div class="ctrl ctrl-toggle" onclick="toggleCtrl('progress-on')">
      <div class="toggle-label">Progress Bar</div>
      <div class="toggle-track on" id="tog-progress-on"><div class="toggle-thumb"></div></div>
    </div>

    <!-- FLY-IN specific -->
    <div class="ctrl ctrl-group" id="grp-flyIn">
      <label>X Travel Distance <span id="lbl-travel">600px</span></label>
      <input type="range" id="ctrl-travel" min="100" max="1200" step="50" value="600" oninput="updateCtrl('travel', this.value)">
    </div>

    <div class="ctrl ctrl-group" id="grp-flyIn2">
      <label>Glow Intensity <span id="lbl-glow">1.0</span></label>
      <input type="range" id="ctrl-glow" min="0" max="3" step="0.1" value="1" oninput="updateCtrl('glow', this.value)">
    </div>

    <div class="ctrl ctrl-group" id="grp-flyIn3">
      <label>Motion Blur Trails <span id="lbl-trails">8</span></label>
      <input type="range" id="ctrl-trails" min="0" max="24" step="1" value="8" oninput="updateCtrl('trails', this.value)">
    </div>

    <div class="ctrl ctrl-group" id="grp-flyIn4">
      <label>Letter Stagger <span id="lbl-stagger">80ms</span></label>
      <input type="range" id="ctrl-stagger" min="0" max="300" step="10" value="80" oninput="updateCtrl('stagger', this.value)">
    </div>

    <!-- MATRIX RAIN specific -->
    <div class="ctrl ctrl-group hidden" id="grp-matrix">
      <label>Column Density <span id="lbl-density">18</span></label>
      <input type="range" id="ctrl-density" min="8" max="40" step="1" value="18" oninput="updateCtrl('density', this.value)">
    </div>

    <div class="ctrl ctrl-group hidden" id="grp-matrix2">
      <label>Rain Speed <span id="lbl-rain-speed">1.2</span></label>
      <input type="range" id="ctrl-rain-speed" min="0.3" max="4" step="0.1" value="1.2" oninput="updateCtrl('rainSpeed', this.value)">
    </div>

    <div class="ctrl ctrl-group hidden" id="grp-matrix3">
      <label>Fade Length <span id="lbl-fade">0.05</span></label>
      <input type="range" id="ctrl-fade" min="0.01" max="0.25" step="0.01" value="0.05" oninput="updateCtrl('fade', this.value)">
    </div>

    <div class="ctrl ctrl-group hidden" id="grp-matrix4">
      <label>Resolve Delay <span id="lbl-resolve">3.5s</span></label>
      <input type="range" id="ctrl-resolve" min="1" max="8" step="0.5" value="3.5" oninput="updateCtrl('resolve', this.value)">
    </div>

    <!-- PARTICLES specific -->
    <div class="ctrl ctrl-group hidden" id="grp-particles">
      <label>Particle Count <span id="lbl-pcount">220</span></label>
      <input type="range" id="ctrl-pcount" min="50" max="600" step="10" value="220" oninput="updateCtrl('pcount', this.value)">
    </div>

    <div class="ctrl ctrl-group hidden" id="grp-particles2">
      <label>Explosion Force <span id="lbl-force">1.0</span></label>
      <input type="range" id="ctrl-force" min="0.2" max="3" step="0.1" value="1" oninput="updateCtrl('force', this.value)">
    </div>

    <div class="ctrl ctrl-group hidden" id="grp-particles3">
      <label>Gravity <span id="lbl-gravity">0.08</span></label>
      <input type="range" id="ctrl-gravity" min="0" max="0.5" step="0.01" value="0.08" oninput="updateCtrl('gravity', this.value)">
    </div>

    <div class="ctrl ctrl-group hidden" id="grp-particles4">
      <label>Reform Delay <span id="lbl-reform">1.8s</span></label>
      <input type="range" id="ctrl-reform" min="0.5" max="5" step="0.1" value="1.8" oninput="updateCtrl('reform', this.value)">
    </div>

  </div>
</div>

<script>
// ===================== STATE =====================
let currentVariant = 'flyIn';
let animHandle = null;
let startTime = null;

const cfg = {
  speed: 1.0,
  travel: 600,
  glow: 1.0,
  trails: 8,
  stagger: 80,
  density: 18,
  rainSpeed: 1.2,
  fade: 0.05,
  resolve: 3.5,
  pcount: 220,
  force: 1.0,
  gravity: 0.08,
  reform: 1.8,
  'scanlines-on': true,
  'vignette-on': true,
  'progress-on': true,
};

// ===================== CONTROLS =====================
function updateCtrl(key, val) {
  cfg[key] = parseFloat(val);
  const labels = {
    speed: ['lbl-speed', v => v+'×'],
    travel: ['lbl-travel', v => v+'px'],
    glow: ['lbl-glow', v => v],
    trails: ['lbl-trails', v => v],
    stagger: ['lbl-stagger', v => v+'ms'],
    density: ['lbl-density', v => v],
    rainSpeed: ['lbl-rain-speed', v => v],
    fade: ['lbl-fade', v => v],
    resolve: ['lbl-resolve', v => v+'s'],
    pcount: ['lbl-pcount', v => v],
    force: ['lbl-force', v => v],
    gravity: ['lbl-gravity', v => v],
    reform: ['lbl-reform', v => v+'s'],
  };
  if (labels[key]) {
    const [id, fmt] = labels[key];
    document.getElementById(id).textContent = fmt(val);
  }
  replay();
}

function toggleCtrl(key) {
  cfg[key] = !cfg[key];
  const track = document.getElementById('tog-' + key);
  track.classList.toggle('on', cfg[key]);
  applyToggles();
}

function applyToggles() {
  document.getElementById('scanlines').style.opacity = cfg['scanlines-on'] ? '0.4' : '0';
  document.querySelector('.vignette').style.opacity = cfg['vignette-on'] ? '1' : '0';
}

// ===================== VARIANT SWITCHER =====================
function setVariant(v, btn) {
  currentVariant = v;
  document.querySelectorAll('.vbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // Show/hide control groups
  document.querySelectorAll('.ctrl-group').forEach(el => el.classList.add('hidden'));
  const groups = { flyIn: ['grp-flyIn','grp-flyIn2','grp-flyIn3','grp-flyIn4'], matrixRain: ['grp-matrix','grp-matrix2','grp-matrix3','grp-matrix4'], particles: ['grp-particles','grp-particles2','grp-particles3','grp-particles4'] };
  (groups[v] || []).forEach(id => { const el=document.getElementById(id); if(el) el.classList.remove('hidden'); });

  replay();
}

function replay() {
  cancelAnimationFrame(animHandle);
  startTime = null;
  resetStage();
  applyToggles();
  setTimeout(() => {
    if (currentVariant === 'flyIn') startFlyIn();
    else if (currentVariant === 'matrixRain') startMatrixRain();
    else if (currentVariant === 'particles') startParticles();
  }, 80);
}

function resetStage() {
  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  document.getElementById('word-stage').style.display = 'flex';
  ['l-m','l-e','l-t','l-r','l-i','l-c','letter-x'].forEach(id => {
    const el = document.getElementById(id);
    el.style.opacity = '0';
    el.style.transform = '';
    el.style.transition = '';
    el.style.filter = '';
  });
  document.getElementById('the-prefix').style.opacity = '0';
  document.getElementById('tagline').style.opacity = '0';
  document.getElementById('letter-x').style.opacity = '0';
  const pw = document.getElementById('progress-wrap');
  pw.style.opacity = cfg['progress-on'] ? '1' : '0';
  document.getElementById('progress-fill').style.width = '0%';
}

// ===================== CANVAS SETUP =====================
function setupCanvas() {
  const wrap = document.getElementById('stage-wrap');
  const canvas = document.getElementById('stage');
  canvas.width = wrap.offsetWidth;
  canvas.height = wrap.offsetHeight;
  return canvas;
}

// ===================== PROGRESS =====================
let progressTimer = null;
function runProgress(duration) {
  if (!cfg['progress-on']) return;
  const fill = document.getElementById('progress-fill');
  const label = document.getElementById('progress-label');
  const msgs = ['Initializing...', 'Loading metrics...', 'Syncing DORA...', 'Building insights...', 'Ready.'];
  let elapsed = 0;
  const interval = 50;
  clearInterval(progressTimer);
  progressTimer = setInterval(() => {
    elapsed += interval;
    const pct = Math.min(100, (elapsed / duration) * 100);
    fill.style.width = pct + '%';
    const msgIdx = Math.floor((pct / 100) * (msgs.length - 1));
    label.textContent = msgs[msgIdx];
    if (pct >= 100) { clearInterval(progressTimer); label.textContent = 'Ready.'; }
  }, interval);
}

// ===================== VARIANT 1: X FLY-IN =====================
function startFlyIn() {
  const canvas = setupCanvas();
  canvas.style.display = 'none'; // not needed for this variant — CSS animation
  document.getElementById('word-stage').style.display = 'flex';

  const s = cfg.speed;
  const stagger = cfg.stagger / s;
  const ids = ['l-m','l-e','l-t','l-r','l-i','l-c'];

  // Fade in METRIC letters with stagger
  ids.forEach((id, i) => {
    const el = document.getElementById(id);
    setTimeout(() => {
      el.style.transition = `opacity ${300/s}ms ease, transform ${300/s}ms ease`;
      el.style.transform = 'translateY(0)';
      el.style.opacity = '1';
    }, 200 + i * stagger);
  });

  // "THE" fades in
  setTimeout(() => {
    const prefix = document.getElementById('the-prefix');
    prefix.style.transition = `opacity ${400/s}ms ease`;
    prefix.style.opacity = '1';
  }, 100);

  // X flies in from right, replaces C
  const cEl = document.getElementById('l-c');
  const xEl = document.getElementById('letter-x');
  const flyDelay = 200 + ids.length * stagger + 200/s;

  setTimeout(() => {
    // C visible, X starts off screen right
    xEl.style.position = 'absolute';
    xEl.style.left = cEl.offsetLeft + 'px';

    // Momentarily show C, then glitch it out
    setTimeout(() => {
      // C flickers
      let flickers = 0;
      const flickerInterval = setInterval(() => {
        cEl.style.opacity = cEl.style.opacity === '0' ? '1' : '0';
        flickers++;
        if (flickers >= 6) {
          clearInterval(flickerInterval);
          cEl.style.opacity = '0';
          // X crashes in with motion blur trails on canvas
          launchX(xEl, s);
        }
      }, 60 / s);
    }, 300 / s);
  }, flyDelay);

  // Tagline
  setTimeout(() => {
    const tl = document.getElementById('tagline');
    tl.style.transition = `opacity ${600/s}ms ease`;
    tl.style.opacity = '1';
  }, flyDelay + 1200/s);

  runProgress((flyDelay + 1400/s) / 1000 * 1000 * (1/s));
}

function launchX(xEl, s) {
  const canvas = setupCanvas();
  canvas.style.display = 'block';
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;

  // Get X final position on screen
  const cEl = document.getElementById('l-c');
  const cRect = cEl.getBoundingClientRect();
  const wrapRect = document.getElementById('stage-wrap').getBoundingClientRect();
  const finalX = cRect.left - wrapRect.left + cRect.width / 2;
  const finalY = cRect.top - wrapRect.top + cRect.height / 2;

  let currentX = finalX + cfg.travel;
  const targetX = finalX;
  let progress = 0;
  const duration = 700 / s;
  const fontSize = parseInt(window.getComputedStyle(cEl).fontSize);
  const trailCount = cfg.trails;

  function easeOutExpo(t) { return t === 1 ? 1 : 1 - Math.pow(2, -10 * t); }

  function drawTrail(x, alpha, blur) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.filter = `blur(${blur}px)`;
    ctx.font = `900 ${fontSize}px Syne, sans-serif`;
    ctx.fillStyle = `hsl(156, 100%, ${50 + blur*2}%)`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('X', x, finalY);
    ctx.restore();
  }

  let lastTime = null;

  function frame(now) {
    if (!lastTime) lastTime = now;
    const dt = (now - lastTime) / duration;
    lastTime = now;
    progress = Math.min(1, progress + dt);
    const eased = easeOutExpo(progress);

    ctx.clearRect(0, 0, w, h);

    // Motion blur trails
    for (let i = trailCount; i >= 0; i--) {
      const trailProgress = Math.max(0, progress - (i / trailCount) * 0.3);
      const trailEased = easeOutExpo(trailProgress);
      const tx = currentX + (targetX - currentX) * trailEased;
      // Actually use interpolated positions
      const trailX = finalX + cfg.travel * (1 - easeOutExpo(Math.max(0, progress - i*0.02)));
      const alpha = (1 - i/trailCount) * 0.15 * (cfg.glow);
      const blur = (i / trailCount) * 8;
      if (alpha > 0.01) drawTrail(trailX, alpha, blur);
    }

    // Main X
    const ix = finalX + cfg.travel * (1 - eased);
    ctx.save();
    ctx.font = `900 ${fontSize}px Syne, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Glow layers
    for (let g = 3; g >= 0; g--) {
      ctx.save();
      ctx.filter = `blur(${g * 6 * cfg.glow}px)`;
      ctx.globalAlpha = (0.15 + (1-g/3)*0.7) * Math.min(1, progress*3);
      ctx.fillStyle = g === 0 ? '#fff' : '#4fffb0';
      ctx.fillText('X', ix, finalY);
      ctx.restore();
    }
    ctx.restore();

    if (progress < 1) {
      animHandle = requestAnimationFrame(frame);
    } else {
      // Lock X in DOM, clear canvas
      xEl.style.opacity = '1';
      xEl.style.position = '';
      const glowVal = cfg.glow;
      xEl.style.textShadow = `0 0 ${20*glowVal}px var(--accent), 0 0 ${50*glowVal}px var(--accent), 0 0 ${80*glowVal}px rgba(79,255,176,0.4)`;
      setTimeout(() => { ctx.clearRect(0,0,w,h); canvas.style.display='none'; }, 100);

      // Impact flash
      ctx.fillStyle = 'rgba(79,255,176,0.12)';
      ctx.fillRect(0,0,w,h);
    }
  }

  animHandle = requestAnimationFrame(frame);
}

// ===================== VARIANT 2: MATRIX RAIN =====================
function startMatrixRain() {
  const canvas = setupCanvas();
  canvas.style.display = 'block';
  document.getElementById('word-stage').style.display = 'none';
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;

  const fontSize = 14;
  const cols = Math.floor(w / fontSize * (cfg.density / 18));
  const drops = Array(cols).fill(0).map(() => Math.random() * -50);
  const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ∇∆∑∏∂ΩπΦΨ';
  const targetWord = 'METRIX';
  const resolveAfter = cfg.resolve * 1000 / cfg.speed;
  const rainSpd = cfg.rainSpeed * cfg.speed;

  let resolving = false;
  let resolveProgress = 0;
  let resolveStart = null;
  let elapsed = 0;
  let lastTime = null;

  // Where to draw the final word (centered)
  ctx.font = `900 ${Math.floor(w * 0.11)}px Syne, sans-serif`;
  const wordW = ctx.measureText(targetWord).width;
  const wordX = (w - wordW) / 2;
  const wordY = h / 2;
  const wordH = Math.floor(w * 0.11);

  function frame(now) {
    if (!lastTime) lastTime = now;
    const dt = now - lastTime; lastTime = now;
    elapsed += dt;

    if (!resolving && elapsed > resolveAfter) {
      resolving = true; resolveStart = now;
    }

    // Fade trail
    ctx.fillStyle = `rgba(0,0,0,${cfg.fade * cfg.speed})`;
    ctx.fillRect(0, 0, w, h);

    if (!resolving) {
      // Classic rain
      ctx.font = `${fontSize}px DM Mono, monospace`;
      drops.forEach((y, i) => {
        const char = chars[Math.floor(Math.random() * chars.length)];
        const x = i * (w / cols);
        // Lead character bright
        ctx.fillStyle = '#afffdf';
        ctx.fillText(char, x, y * fontSize);
        // Rest green
        ctx.fillStyle = '#00ff41';
        ctx.fillText(char, x, y * fontSize - fontSize);
        drops[i] += rainSpd;
        if (drops[i] * fontSize > h && Math.random() > 0.975) drops[i] = 0;
      });
    } else {
      // Continue rain but fade it out
      const rp = Math.min(1, (now - resolveStart) / (1500 / cfg.speed));
      ctx.font = `${fontSize}px DM Mono, monospace`;
      drops.forEach((y, i) => {
        const char = chars[Math.floor(Math.random() * chars.length)];
        const x = i * (w / cols);
        ctx.globalAlpha = (1 - rp) * 0.6;
        ctx.fillStyle = '#00ff41';
        ctx.fillText(char, x, y * fontSize);
        ctx.globalAlpha = 1;
        drops[i] += rainSpd * (1 - rp * 0.8);
        if (drops[i] * fontSize > h && Math.random() > 0.975) drops[i] = 0;
      });

      // Word emerges
      const wordProgress = Math.max(0, (now - resolveStart - 300/cfg.speed) / (1200/cfg.speed));
      const wp = Math.min(1, wordProgress);

      // Glow halo
      for (let g = 4; g >= 0; g--) {
        ctx.save();
        ctx.globalAlpha = wp * 0.3 * (1 - g/4);
        ctx.filter = `blur(${g * 12}px)`;
        ctx.font = `900 ${wordH}px Syne, sans-serif`;
        ctx.fillStyle = '#4fffb0';
        ctx.textBaseline = 'middle';
        ctx.fillText(targetWord, wordX, wordY);
        ctx.restore();
      }

      // Main word — letters resolve one by one
      ctx.font = `900 ${wordH}px Syne, sans-serif`;
      ctx.textBaseline = 'middle';
      let xOffset = wordX;
      for (let li = 0; li < targetWord.length; li++) {
        const letterProgress = Math.min(1, Math.max(0, (wp - li/targetWord.length*0.5) * 2));
        const isX = li === targetWord.length - 1;
        if (letterProgress > 0) {
          // Scramble → resolve
          const char = letterProgress > 0.8 ? targetWord[li] : chars[Math.floor(Math.random() * chars.length)];
          ctx.globalAlpha = letterProgress;
          ctx.fillStyle = isX ? '#4fffb0' : '#e8e8f0';
          if (isX) {
            // Glow X
            ctx.save();
            ctx.filter = `blur(0px)`;
            ctx.shadowColor = '#4fffb0';
            ctx.shadowBlur = 30 * letterProgress;
            ctx.fillText(char, xOffset, wordY);
            ctx.restore();
          } else {
            ctx.fillText(char, xOffset, wordY);
          }
          ctx.globalAlpha = 1;
        }
        xOffset += ctx.measureText(targetWord[li]).width;
      }

      // "THE" and tagline
      if (wp > 0.7) {
        const tp = Math.min(1, (wp - 0.7) / 0.3);
        ctx.globalAlpha = tp * 0.5;
        ctx.font = `400 ${wordH * 0.18}px Syne, sans-serif`;
        ctx.fillStyle = '#fff';
        ctx.letterSpacing = '0.3em';
        ctx.textAlign = 'center';
        ctx.fillText('THE', w/2, wordY - wordH * 0.7);
        ctx.font = `400 ${wordH * 0.09}px DM Mono, monospace`;
        ctx.fillStyle = '#fff';
        ctx.fillText('ENGINEERING INTELLIGENCE PLATFORM', w/2, wordY + wordH * 0.7);
        ctx.textAlign = 'left';
        ctx.letterSpacing = '0';
        ctx.globalAlpha = 1;
      }

      resolveProgress = wp;
      if (wp >= 1) { runProgress(0); return; }
    }

    animHandle = requestAnimationFrame(frame);
  }

  runProgress(resolveAfter + 1500/cfg.speed);
  animHandle = requestAnimationFrame(frame);
}

// ===================== VARIANT 3: PARTICLE DISSOLVE =====================
function startParticles() {
  const canvas = setupCanvas();
  canvas.style.display = 'block';
  document.getElementById('word-stage').style.display = 'none';
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const cx = w/2, cy = h/2;

  // Phase 1: Draw "METRIX" and sample pixel positions for particles
  const wordH = Math.floor(w * 0.10);
  ctx.font = `900 ${wordH}px Syne, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.fillText('METRIX', cx, cy);

  // Sample pixel positions
  const imgData = ctx.getImageData(0, 0, w, h);
  const pixels = [];
  for (let y = 0; y < h; y += 3) {
    for (let x = 0; x < w; x += 3) {
      const idx = (y * w + x) * 4;
      if (imgData.data[idx+3] > 80) {
        // Find which letter
        pixels.push({ tx: x, ty: y });
      }
    }
  }

  ctx.clearRect(0, 0, w, h);

  // Build particles
  const pCount = Math.min(cfg.pcount, pixels.length, 800);
  const sampled = pixels.sort(()=>Math.random()-0.5).slice(0, pCount);

  const particles = sampled.map(p => {
    // Determine if this pixel is in the X region (rightmost ~17%)
    const isX = p.tx > cx + (wordH * 2.2);
    const angle = Math.random() * Math.PI * 2;
    const speed = (1 + Math.random() * 3) * cfg.force;
    return {
      tx: p.tx, ty: p.ty,
      x: p.tx + (Math.random()-0.5)*w*0.8,
      y: p.ty + (Math.random()-0.5)*h*0.8,
      vx: Math.cos(angle)*speed * (isX ? 1.8 : 1),
      vy: Math.sin(angle)*speed * (isX ? 1.8 : 1) - 1,
      size: 1.5 + Math.random() * 1.5,
      isX,
      color: isX ? '#4fffb0' : '#e8e8f0',
      alpha: 0,
      phase: 'appear', // appear → explode → reform
      delay: Math.random() * 400,
    };
  });

  const reformDelay = cfg.reform * 1000 / cfg.speed;
  const totalDuration = reformDelay + 2000 / cfg.speed;
  let startTimePart = null;

  function easeOutCubic(t) { return 1 - Math.pow(1-t, 3); }
  function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }

  function frame(now) {
    if (!startTimePart) startTimePart = now;
    const elapsed = now - startTimePart;
    const globalT = Math.min(1, elapsed / totalDuration);

    ctx.clearRect(0, 0, w, h);

    // Background glow for X region during reform
    if (elapsed > reformDelay) {
      const rp = Math.min(1, (elapsed - reformDelay) / (1500/cfg.speed));
      ctx.save();
      ctx.filter = `blur(${30 * rp}px)`;
      ctx.globalAlpha = rp * 0.15;
      ctx.fillStyle = '#4fffb0';
      ctx.beginPath();
      const xCenter = cx + (wordH * 2.8);
      ctx.arc(xCenter, cy, wordH * 0.8, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    particles.forEach(p => {
      const t = Math.max(0, elapsed - p.delay) / (cfg.speed * 1000);

      if (elapsed < reformDelay) {
        // EXPLODE phase: particles fly out
        const ep = Math.min(1, t * 1.5);
        p.x = p.tx + (p.vx * ep * 80);
        p.y = p.ty + (p.vy * ep * 80) + (cfg.gravity * 200 * ep * ep);
        p.alpha = ep > 0.05 ? Math.min(1, ep * 3) : 0;
      } else {
        // REFORM phase: particles fly back to target
        const rElapsed = elapsed - reformDelay;
        const rDuration = 1800 / cfg.speed;
        const rp = easeOutCubic(Math.min(1, rElapsed / rDuration));
        const explodePos = {
          x: p.tx + (p.vx * 80),
          y: p.ty + (p.vy * 80) + (cfg.gravity * 200),
        };
        p.x = explodePos.x + (p.tx - explodePos.x) * rp;
        p.y = explodePos.y + (p.ty - explodePos.y) * rp;
        p.alpha = 0.4 + rp * 0.6;
      }

      if (p.alpha > 0.02) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
        const glowColor = p.isX ? '#4fffb0' : '#ffffff';
        ctx.fillStyle = glowColor;
        ctx.globalAlpha = p.alpha;
        ctx.fill();

        // Glow for X particles
        if (p.isX && elapsed > reformDelay) {
          const rp2 = Math.min(1, (elapsed-reformDelay) / (1800/cfg.speed));
          ctx.save();
          ctx.filter = `blur(${3*rp2}px)`;
          ctx.globalAlpha = p.alpha * 0.4 * rp2;
          ctx.arc(p.x, p.y, p.size*2, 0, Math.PI*2);
          ctx.fill();
          ctx.restore();
        }
        ctx.globalAlpha = 1;
      }
    });

    // "THE" and tagline appear at end
    const endProgress = Math.max(0, (elapsed - reformDelay - 1200/cfg.speed) / (800/cfg.speed));
    if (endProgress > 0) {
      const ep = Math.min(1, endProgress);
      ctx.globalAlpha = ep * 0.5;
      ctx.font = `400 ${wordH*0.18}px Syne, sans-serif`;
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('THE', cx, cy - wordH * 0.72);
      ctx.font = `400 ${wordH*0.09}px DM Mono, monospace`;
      ctx.fillText('ENGINEERING INTELLIGENCE PLATFORM', cx, cy + wordH * 0.72);
      ctx.globalAlpha = 1;
    }

    if (elapsed < totalDuration + 500) {
      animHandle = requestAnimationFrame(frame);
    }
  }

  runProgress(totalDuration);
  animHandle = requestAnimationFrame(frame);
}

// ===================== FULLSCREEN =====================
function fullscreen() {
  const wrap = document.getElementById('stage-wrap');
  if (wrap.requestFullscreen) wrap.requestFullscreen();
  else if (wrap.webkitRequestFullscreen) wrap.webkitRequestFullscreen();
  setTimeout(replay, 300);
}

// ===================== RESIZE =====================
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(replay, 200);
});

// ===================== INIT =====================
window.addEventListener('load', () => {
  // Brief delay so fonts load
  setTimeout(replay, 200);
});
</script>
