<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}THE METRIX{% endblock %}</title>
<!-- Optimized font loading with display=swap to show text immediately -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --accent: #4fffb0;
    --accent2: #7c6dfa;
    --accent3: #ff6b6b;
    --accent4: #ffd93d;
    --text: #e8e8f0;
    --muted: #6b6b8a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { overflow-y: scroll; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; overflow-x: hidden; }
  /* Ensure fonts render immediately with fallbacks while loading */
  body { font-display: swap; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(79,255,176,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(79,255,176,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }
  .container { max-width: 1400px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

  /* NAV */
  .global-nav { background: rgba(10,10,15,0.95); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; backdrop-filter: blur(12px); }
  .global-nav .container { display: flex; align-items: center; gap: 20px; }
  .nav-brand { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 24px; letter-spacing: 0.08em; color: var(--accent); padding: 14px 20px 14px 0; margin-right: 8px; border-right: 1px solid var(--border); display: flex; align-items: center; gap: 10px; white-space:nowrap; text-decoration: none; cursor: pointer; transition: all 0.2s; }
  .nav-brand:hover { color: #3de8a0; transform: translateX(2px); }
  .nav-brand-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }
  .nav-links { display: flex; flex: 1; gap: 8px; }
  .nav-link { display: flex; align-items: center; gap: 6px; padding: 14px 16px; font-size: 11px; color: var(--muted); text-decoration: none; border-bottom: 2px solid transparent; transition: all 0.15s; letter-spacing: 0.04em; white-space:nowrap; }
  .nav-link:hover { color: var(--text); }
  .nav-link.active { color: var(--accent); border-bottom-color: var(--accent); }
  .theme-toggle { padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; color: var(--text); font-size: 16px; transition: all 0.2s; margin: 8px 0; min-width: 44px; text-align: center; }
  .theme-toggle:hover { border-color: var(--accent); background: var(--surface2); }
  #demoToggle.active { background: rgba(255,217,61,0.15); color: var(--accent4); border-color: rgba(255,217,61,0.5); }
  .demo-badge { display: none; background: rgba(255,217,61,0.2); color: var(--accent4); border: 1px solid rgba(255,217,61,0.5); padding: 4px 10px; border-radius: 6px; font-size: 9px; font-weight: 700; letter-spacing: 0.1em; position: absolute; left: 50%; transform: translateX(-50%); }
  body.demo-mode .demo-badge { display: block; }
  .header-inner { position: relative; }

  /* COMMON COMPONENTS */
  .btn { padding: 10px 20px; border-radius: 7px; font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; letter-spacing: 0.03em; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #3de8a0; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(79,255,176,0.3); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm { padding: 7px 14px; font-size: 11px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .card-title { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }

  /* Numeric values - use Space Grotesk for better readability */
  .metric-value, .stat-val, .stat-item-value { font-family: 'Space Grotesk', sans-serif !important; font-feature-settings: 'tnum' 1; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  a { color: var(--accent2); text-decoration: none; }

{% block extra_style %}{% endblock %}
</style>

<!-- Component Library CSS -->
<link rel="stylesheet" href="/static/css/components.css">

<!-- Page-specific head content -->
{% block extra_head %}{% endblock %}
</head>
<body>

<nav class="global-nav">
  <div class="container">
    <a href="/" class="nav-brand"><div class="nav-brand-dot"></div>THE METRIX</a>
    <div class="nav-links">
      <a class="nav-link {% block nav_insights %}{% endblock %}" href="/"><span>🎯</span>Insights</a>
      <a class="nav-link {% block nav_sprint %}{% endblock %}" href="/sprint"><span>📊</span>Analytics</a>
      <a class="nav-link {% block nav_metrics %}{% endblock %}" href="/metrics"><span>📈</span>Developer</a>
      <a class="nav-link {% block nav_dora %}{% endblock %}" href="/dora"><span>🚀</span>DORA</a>
      <a class="nav-link {% block nav_survey %}{% endblock %}" href="/survey"><span>📋</span>Survey</a>
      <a class="nav-link {% block nav_opencode %}{% endblock %}" href="/opencode"><span>⚡</span>AI Stats</a>
      <a class="nav-link {% block nav_feedback %}{% endblock %}" href="/feedback"><span>💬</span>Feedback</a>
      <a class="nav-link {% block nav_settings %}{% endblock %}" href="/settings"><span>⚙️</span>Settings</a>
      <button class="theme-toggle" id="demoToggle" title="Toggle demo data">📊</button>
      <button class="theme-toggle" id="themeToggle">🌙</button>
    </div>
  </div>
</nav>

{% block content %}{% endblock %}

<script>
// Global demo mode management
window.DEMO_MODE = localStorage.getItem('demo_mode') === 'true';

function updateDemoMode() {
  const btn = document.getElementById('demoToggle');
  if (window.DEMO_MODE) {
    document.body.classList.add('demo-mode');
    if (btn) btn.classList.add('active');
  } else {
    document.body.classList.remove('demo-mode');
    if (btn) btn.classList.remove('active');
  }

  // Update Settings page radio buttons if on settings page
  const demoOnRadio = document.getElementById('demoOn');
  const demoOffRadio = document.getElementById('demoOff');
  if (demoOnRadio && demoOffRadio) {
    if (window.DEMO_MODE) {
      demoOnRadio.checked = true;
    } else {
      demoOffRadio.checked = true;
    }
  }
}

function toggleDemoMode() {
  window.DEMO_MODE = !window.DEMO_MODE;
  localStorage.setItem('demo_mode', window.DEMO_MODE);
  updateDemoMode();

  // Trigger page-specific reload if available
  if (typeof window.reloadPageData === 'function') {
    window.reloadPageData();
  }

  // Dispatch custom event so other parts of the app can react
  window.dispatchEvent(new CustomEvent('demoModeChanged', { detail: { enabled: window.DEMO_MODE } }));
}

// Initialize demo mode on load
document.addEventListener('DOMContentLoaded', () => {
  updateDemoMode();

  const demoBtn = document.getElementById('demoToggle');
  if (demoBtn) {
    demoBtn.addEventListener('click', toggleDemoMode);
  }
});

// Format numbers with commas
function formatNumber(num) {
  if (num === null || num === undefined || num === 'N/A') return num;
  return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

// Auto-format all numeric displays on page load
document.addEventListener('DOMContentLoaded', () => {
  // Initialize demo mode state
  updateDemoMode();

  // Format numbers
  document.querySelectorAll('.metric-value, .stat-val, .stat-item-value').forEach(el => {
    const text = el.textContent.trim();
    const match = text.match(/^([+-]?\d+)(.*)$/);
    if (match) {
      const [, num, suffix] = match;
      el.innerHTML = formatNumber(num) + suffix;
    }
  });
});

const themeToggle = document.getElementById('themeToggle');
const html = document.documentElement;
const savedTheme = localStorage.getItem('theme') || 'dark';

if (savedTheme === 'light') {
  html.style.setProperty('--bg', '#f8f9fa');
  html.style.setProperty('--surface', '#ffffff');
  html.style.setProperty('--surface2', '#f1f3f5');
  html.style.setProperty('--border', '#dee2e6');
  html.style.setProperty('--text', '#1f2937');
  html.style.setProperty('--muted', '#6b7280');
  html.style.setProperty('--accent', '#dc2626');
  html.style.setProperty('--accent2', '#7c6dfa');
  html.style.setProperty('--accent3', '#ef4444');
  html.style.setProperty('--accent4', '#f59e0b');

  // Update Chart.js defaults for light mode
  if (typeof Chart !== 'undefined') {
    Chart.defaults.color = '#1f2937';
    Chart.defaults.borderColor = '#dee2e6';
  }

  // Update navigation background for light mode
  const nav = document.querySelector('.global-nav');
  if (nav) {
    nav.style.background = 'rgba(255,255,255,0.95)';
  }
}

themeToggle.textContent = savedTheme === 'dark' ? '🌙' : '☀️';

themeToggle.addEventListener('click', () => {
  const isDark = themeToggle.textContent === '🌙';
  localStorage.setItem('theme', isDark ? 'light' : 'dark');
  location.reload();
});
</script>

{% block extra_script %}{% endblock %}

<!-- Feedback Widget Configuration -->
<script>
// Optional: Configure feedback widget before loading
// Falls back to localStorage if endpoint not available
window.METRIX_FEEDBACK_CONFIG = {
  endpoint: '/api/feedback',  // FastAPI proxy (same origin)
  userName: localStorage.getItem('userName') || null,  // Optional - can be set in Settings
};
</script>
<script src="/static/js/feedback-widget.js"></script>

<!-- Splash Screen -->
<script src="/static/js/splash.js"></script>
</body>
</html>
